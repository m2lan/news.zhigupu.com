name: Update News

on:
  schedule:
    # 每天 8:00, 12:00, 18:00, 22:00 (UTC+8)
    - cron: '0 0 * * *'   # 0:00 UTC = 8:00 CST
    - cron: '0 4 * * *'   # 4:00 UTC = 12:00 CST
    - cron: '0 10 * * *'  # 10:00 UTC = 18:00 CST
    - cron: '0 14 * * *'  # 14:00 UTC = 22:00 CST
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger news update
        run: |
          curl -X POST "${{ secrets.SITE_URL }}/api/update" \
            -H "Authorization: Bearer ${{ secrets.UPDATE_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --max-time 60 \
            --retry 3 \
            --retry-delay 10
