<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>常青藤快讯 - EverRead</title>
  <meta name="description" content="AI驱动的新闻资讯，自动整理最新热点">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="/">
        <span class="logo-icon">🌿</span>
        <span>常青藤快讯</span>
      </a>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索新闻标题、内容...">
      </div>
    </div>
  </header>

  <nav class="nav">
    <div class="nav-inner" id="navCategories">
      <div class="nav-item active" data-category="all">全部</div>
      <div class="nav-item" data-category="current">📰 时事热点</div>
      <div class="nav-item" data-category="tech">💻 科技财经</div>
      <div class="nav-item" data-category="sports">⚽ 体育娱乐</div>
      <div class="nav-item" data-category="custom">🏷️ 自定义</div>
    </div>
  </nav>

  <main class="main">
    <div class="news-list" id="newsList">
      <div class="loading"><div class="spinner"></div><p>加载中...</p></div>
    </div>
    <div class="load-more" id="loadMore" style="display: none;">
      <button class="btn" id="loadMoreBtn">加载更多</button>
    </div>
  </main>

  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>App.init();</script>
</body>
</html>
